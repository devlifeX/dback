name: Publish PPA

on:
  push:
    tags:
      - "v*"

jobs:
  ppa:
    name: Upload to Launchpad PPA (${{ matrix.ppa_dist }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - ppa_dist: noble
          - ppa_dist: jammy
    # Secrets are stored as Environment secrets (see ppa.md).
    environment: PPA_GPG_PASSPHRASE
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput gnupg golang-go

      - name: Resolve app version
        id: version
        run: echo "app_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync debian/changelog with tag
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
          PPA_DIST: ${{ matrix.ppa_dist }}
        run: ./packaging/sync-debian-changelog.sh

      - name: Import GPG signing key
        env:
          PPA_GPG_PRIVATE_KEY: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          PPA_GPG_PASSPHRASE: ${{ secrets.PPA_GPG_PASSPHRASE }}
        run: ./packaging/ci-import-gpg.sh

      - name: Build, sign, and upload source package
        env:
          DEBEMAIL: dvworkmail2017@gmail.com
          DEBFULLNAME: Dariush Vesal
          GPG_KEY_ID: E8B25AD68688EC024359E03FE00C906928B7599C
          DEBSIGN_KEYID: E8B25AD68688EC024359E03FE00C906928B7599C
          GOTOOLCHAIN: local
          SIGN: "1"
          UPLOAD: "1"
        run: |
          unset GPG_TTY
          ./packaging/build-ppa.sh
