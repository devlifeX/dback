name: Publish PPA

on:
  push:
    tags:
      - "v*"

jobs:
  ppa:
    name: Upload to Launchpad PPA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install packaging tools
        run: |
          sudo apt-get update
          sudo apt-get install -y devscripts debhelper dput gnupg

      - name: Resolve app version
        id: version
        run: echo "app_version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Sync debian/changelog with tag
        env:
          APP_VERSION: ${{ steps.version.outputs.app_version }}
        run: ./packaging/sync-debian-changelog.sh

      - name: Import GPG signing key
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.PPA_GPG_PRIVATE_KEY }}
          passphrase: ${{ secrets.PPA_GPG_PASSPHRASE }}
          fingerprint: E8B25AD68688EC024359E03FE00C906928B7599C

      - name: Build, sign, and upload source package
        env:
          DEBFULLNAME: Dariush Vesal
          DEBEMAIL: dvworkmail2017@gmail.com
          GPG_KEY_ID: E8B25AD68688EC024359E03FE00C906928B7599C
          SIGN: "1"
          UPLOAD: "1"
        run: ./packaging/build-ppa.sh
